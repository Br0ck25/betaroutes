<!DOCTYPE html>
<html lang="en">
<head>
<link rel="stylesheet" href="/styles.css">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
<meta content="width=device-width, initial-scale=1, viewport-fit=cover" name="viewport"/>
<meta content="unsafe-none" http-equiv="Cross-Origin-Opener-Policy"/>
<title>
    Go Route Yourself - Route and Cost Calculator with Log - Plan, Optimize, and Track Your Trips
</title>
<meta content="Easily calculate driving routes, optimize stops, track trip costs, and log your earnings. Save your routes securely and export your trip logs." name="description"/>
<meta content="Route and Cost Calculator with Log" property="og:title"/>
<meta content="Plan routes, calculate costs, optimize trips, and track your earnings with our smart route logging tool." property="og:description"/>
<meta content="https://gorouteyourself.com/" property="og:url"/>
<meta content="website" property="og:type"/>
<meta content="https://gorouteyourself.com/logo.png" property="og:image"/>
<meta content="Route and Cost Calculator" property="og:site_name"/>
<link href="/logo-512.png" rel="icon" sizes="512x512" type="image/png">
<link href="/logo-512.png" rel="apple-touch-icon"/>
<meta content="yes" name="mobile-web-app-capable"/>
<meta content="Route Calculator" name="apple-mobile-web-app-title"/>
<meta content="#ffffff" name="theme-color"/>
<link href="/manifest.json" rel="manifest"/>
<script defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCHrNRHP9LNGVHi9Srk1Gfcrv-4ee_gUHQ&libraries=places&callback=initMap"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
</head>
<body>
  <div class="top-bar" id="top-bar">
    <div class="top-bar-left">
      <button class="hamburger-button" id="hamburger-button" onclick="toggleMenu()">☰</button>
    </div>
    <img class="logo-image" id="logo-image" src="/logo.png" onclick="scrollToTop()" />
    <div class="top-bar-right">
      <span class="username-display" id="username-display"></span>
    </div>
  </div>

  <div class="auth-banner" id="auth-message" style="display: none;">🚧 To log your route, sign in or create an account.</div>
  <div id="offline-banner" class="offline-banner" style="display: none;">🛜 Offline Mode: Showing cached routes.</div>
  <div id="logout-message" style="display: none;"></div>

  <div class="container">
    <label for="log-date">Date</label>
    <input id="log-date" type="date" required>

    <label for="start-address">Start Address</label>
    <input id="start-address" type="text" required>

    <div id="destinations-container">
      <div class="destination">
        <label for="destination-1">Destination 1</label>
        <input id="destination-1" list="recent-destinations" type="text" required>
        <datalist id="recent-destinations"></datalist>
        <label for="earnings-1">Earnings for Destination 1</label>
        <input id="earnings-1" type="number" required>
        <div class="destination-actions">
          <button class="delete-btn" onclick="deleteDestination(this)">Delete</button>
          <button class="move-btn" onclick="moveDestinationUp(this)">Move Up</button>
          <button class="move-btn" onclick="moveDestinationDown(this)">Move Down</button>
        </div>
      </div>
    </div>

    <button onclick="addDestination()">Add Destination</button>

    <label for="end-address">End Address</label>
    <input id="end-address" type="text" required>

    <label for="mpg">Miles per Gallon (MPG)</label>
    <input id="mpg" type="number" required>

    <label for="gas-price">Fuel Price per Gallon</label>
    <input id="gas-price" type="number" required>

    <label for="start-time">Start Time</label>
    <input id="start-time" type="time">

    <label for="end-time">End Time</label>
    <input id="end-time" type="time">

    <label for="total-hours">Total Hours</label>
    <input id="total-hours" type="text" readonly style="background:#eee; cursor:not-allowed">
    <div id="hours-display"></div>

    <div class="optional-costs">
      <h3>Optional Daily Costs</h3>
      <label for="maintenance-cost">Vehicle Maintenance Cost (Optional)</label>
      <input id="maintenance-cost" type="number">
      <label for="supplies-cost">Supplies Cost (Optional)</label>
      <input id="supplies-cost" type="number">
    </div>

    <label for="log-notes">Notes (Optional)</label>
    <textarea id="log-notes" rows="4"></textarea>

    <div id="confirmation-message" style="display: none; color: green; font-weight: bold; margin-top: 10px"></div>

    <div class="hidden" id="results">
      <p>Mileage: <span id="total-mileage"></span> miles</p>
      <p>Drive Time: <span id="total-time"></span></p>
      <p>Total Earnings: $<span id="total-earnings"></span></p>
      <p>Fuel Cost: $<span id="fuel-cost"></span></p>
      <p>Maintenance Cost: $<span id="maintenance-cost-result"></span></p>
      <p>Supplies Cost: $<span id="supplies-cost-result"></span></p>
      <p>Net Profit: $<span id="net-profit"></span></p>
      <p>Net Profit per Hour: $<span id="profit-per-hour"></span></p>
    </div>

    <div class="hidden" id="map"></div>
    <div id="detailed-results"></div>
    <div id="mileage-display"></div>
    <div id="optimized-mileage-display"></div>
  </div>

  <div id="log-container">
    <div id="log-header">
      <h2>Log</h2>
      <div id="log-summary"></div>
    </div>
    <div id="log-title-bar">
      <div class="date-filter">
        <label for="filter-start-date">Start Date:</label>
        <input id="filter-start-date" type="date" onchange="onStartDateChange()">
      </div>
      <div class="date-filter">
        <label for="filter-end-date">End Date:</label>
        <input id="filter-end-date" type="date" onchange="filterLogs()">
      </div>
      <div class="filter-section">
        <label for="filter-search">Search:</label>
        <input id="filter-search" type="text" placeholder="Search anything..." oninput="filterLogs()">
      </div>
      <div class="filter-section">
        <button onclick="clearFilters()">Clear</button>
      </div>
    </div>
    <ul id="log-list"></ul>
  </div>

  <input id="import-file" type="file" accept=".csv" style="display: none" onchange="importLog()">
  <div class="hidden" id="overlay"></div>
  <div id="resume-modal" class="resume-modal" style="display:none;"></div>

  <div id="bottom-bar">
    <button onclick="scrollToTop()">
      <span class="material-icons">arrow_upward</span>
      Top
    </button>
    <button onclick="optimizeRoute()">
      <span class="material-icons">alt_route</span>
      Optimize
    </button>
    <button onclick="logResults()">
      <span class="material-icons">save</span>
      Log
    </button>
  </div>

  <script>
    // Place any required inline JS or initMap loader
  </script>
</body>
</html>
