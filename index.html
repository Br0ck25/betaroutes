<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Route and Cost Calculator with Log</title>
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCHrNRHP9LNGVHi9Srk1Gfcrv-4ee_gUHQ&amp;libraries=places&amp;callback=initMap" async="" defer=""></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 20px 0;
            display: flex;
            justify-content: center;
            /* Center horizontally */
            align-items: flex-start;
            /* Align items to the top for better flow */
            min-height: 100vh;
            flex-direction: column;
        }

        .container,
        #log-container,
        #import-container,
        #export-options,
        .edit-form-container {
            background-color: white;
            box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.1);
            padding: 20px;
            border-radius: 8px;
            width: 100%;
            max-width: 700px;
            margin-bottom: 20px;
            box-sizing: border-box;
            overflow: auto;
        }

        #export-options,
        #import-container {
            text-align: center;
        }

        #export-options button,
        #import-container button,
        #import-container input[type="file"] {
            margin: 5px 10px;
            padding: 10px 15px;
            font-size: 16px;
        }

        h1 {
            text-align: center;
            font-size: 24px;
            margin-bottom: 20px;
            color: #333;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }

        input[type="text"],
        input[type="number"],
        button,
        select {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }

        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 18px;
        }

        button:hover {
            background-color: #45a049;
        }

        #results {
            display: none;
            margin-top: 20px;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            background-color: #f9f9f9;
        }

        #map {
            width: 100%;
            height: 300px;
            margin-top: 20px;
            flex-shrink: 0;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        .destination {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            margin-bottom: 15px;
            padding: 10px;
            border: 1px solid #eee;
            border-radius: 5px;
            background-color: #fefefe;
        }

        .destination label {
            margin-top: 0;
        }

        .destination input {
            margin-bottom: 8px;
        }

        .delete-btn,
        .move-btn {
            background-color: red;
            color: white;
            padding: 8px 12px;
            font-size: 14px;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            margin-right: 5px;
            margin-top: 5px;
        }

        .delete-btn:hover,
        .move-btn:hover {
            background-color: darkred;
        }

        .move-btn {
            background-color: #ffa500;
        }

        .move-btn:hover {
            background-color: #ff7f00;
        }

        .destination-actions {
            display: flex;
            gap: 5px;
            margin-top: 10px;
        }

        #log-list {
            list-style-type: none;
            padding: 0;
        }

        #log-list li {
            border-bottom: 1px solid #eee;
            padding: 10px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #log-list li:last-child {
            border-bottom: none;
        }

        .log-item-details {
            flex-grow: 1;
            margin-right: 10px;
        }

        .log-actions button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            margin-left: 5px;
        }

        .log-actions button:hover {
            background-color: #0056b3;
        }

        #log-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        #organize-by-day {
            padding: 8px;
            border-radius: 5px;
            border: 1px solid #ccc;
            font-size: 16px;
        }

        .hidden {
            display: none;
        }

        .optional-costs {
            margin-top: 20px;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            background-color: #f9f9f9;
        }

        .optional-costs label {
            font-weight: normal;
        }

        #export-options button {
            margin: 5px 10px;
            padding: 10px 15px;
            font-size: 16px;
        }

        .edit-btn {
            background-color: #ffc107;
            color: #333;
        }

        .edit-btn:hover {
            background-color: #e0a800;
        }

        .save-btn,
        .cancel-btn {
            background-color: #28a745;
            color: white;
            margin-left: 5px;
        }

        .cancel-btn {
            background-color: #dc3545;
        }

        .edit-form-container {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1000;
            max-height: 80vh;
            overflow-y: auto;
        }

        .edit-form-container label {
            font-weight: normal;
        }

        #overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 999;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
</head>

<body>
    <div class="container">
        <h1>Route and Cost Calculator</h1>

        <label for="start-address">Start Address</label>
        <input type="text" id="start-address" placeholder="Enter start address" required>

        <div id="destinations-container">
            <div class="destination">
                <label for="destination-1">Destination 1</label>
                <input type="text" id="destination-1" placeholder="Enter destination address" required>
                <label for="earnings-1">Earnings for Destination 1</label>
                <input type="number" id="earnings-1" placeholder="Enter earnings for destination" required>
                <div class="destination-actions">

                    <button class="delete-btn" onclick="deleteDestination(this)">Delete</button>
                    <button class="move-btn" onclick="moveDestinationUp(this)">Move Up</button>
                    <button class="move-btn" onclick="moveDestinationDown(this)">Move Down</button>
                </div>
            </div>
        </div>

        <button onclick="addDestination()">Add Destination</button>
        <button onclick="optimizeRoute()">Optimize Route</button>

        <label for="end-address">End Address</label>
        <input type="text" id="end-address" placeholder="Enter end address" required>

        <label for="mpg">Miles per Gallon (MPG)</label>
        <input type="number" id="mpg" placeholder="Enter miles per gallon" required>

        <label for="gas-price">Gas Price per Gallon</label>
        <input type="number" id="gas-price" placeholder="Enter gas price per gallon" required>

        <label for="hours-worked">Hours Worked (Optional)</label>
        <input type="number" id="hours-worked" placeholder="Enter total hours worked">


        <div class="optional-costs">
            <h3>Optional Daily Costs</h3>
            <label for="maintenance-cost">Vehicle Maintenance Cost (Optional)</label>
            <input type="number" id="maintenance-cost" placeholder="Enter maintenance cost for the day" value="0">

            <label for="supplies-cost">Supplies Cost (Optional)</label>
            <input type="number" id="supplies-cost" placeholder="Enter supplies cost for the day" value="0">
        </div>


        <button onclick="calculateRoute()">Calculate</button>
        <button onclick="logLastResult()">Log</button>

        <div id="results" class="hidden">
            <p>Total Mileage: <span id="total-mileage"></span> miles</p>
            <p>Total Drive Time: <span id="total-time"></span></p>
            <p>Total Earnings: $<span id="total-earnings"></span></p>
            <p>Fuel Cost: $<span id="fuel-cost"></span></p>
            <p>Maintenance Cost: $<span id="maintenance-cost-result"></span></p>
            <p>Supplies Cost: $<span id="supplies-cost-result"></span></p>
            <p>Net Profit: $<span id="net-profit"></span></p>
            <p>Net Profit per Hour (including drive time): $<span id="profit-per-hour"></span></p>
        </div>

        <div id="map" class="hidden"></div>
    </div>

    <div id="log-container">
        <div id="log-header">
            <h2>Profit Log</h2>
            <div>
                <label for="organize-by-day">Organize by Day:</label>
                <select id="organize-by-day" onchange="displayLog(this.value)">
                    <option value="all">All</option>
                </select>
            </div>
        </div>
        <ul id="log-list">
        </ul>
    </div>

    <div id="export-options">
        <h3>Export Log</h3>
        <button onclick="exportToCSV()">Export to CSV</button>
        <button onclick="exportToPDF()">Export to PDF</button>
    </div>

    <div id="import-container">
        <h3>Import Log</h3>
        <input type="file" id="import-file" accept=".csv">
        <button onclick="importLog()">Import Log</button>
    </div>

    <div id="overlay" class="hidden"></div>

    <div id="edit-form-container" class="edit-form-container hidden">
        <h3>Edit Log Entry</h3>
        <label for="edit-date">Date</label>
        <input type="text" id="edit-date">

        <label for="edit-start-address">Start Address</label>
        <input type="text" id="edit-start-address">

        <div id="edit-destinations-container">
        </div>
        <button type="button" onclick="addEditDestination()">Add Destination</button>

        <label for="edit-end-address">End Address</label>
        <input type="text" id="edit-end-address">

        <label for="edit-total-earnings">Total Earnings</label>
        <input type="number" id="edit-total-earnings">

        <label for="edit-fuel-cost">Fuel Cost</label>
        <input type="number" id="edit-fuel-cost">

        <label for="edit-maintenance-cost">Maintenance Cost</label>
        <input type="number" id="edit-maintenance-cost">

        <label for="edit-supplies-cost">Supplies Cost</label>
        <input type="number" id="edit-supplies-cost">

        <label for="edit-total-mileage">Total Mileage</label>
        <input type="number" id="edit-total-mileage">

        <label for="edit-total-time">Total Drive Time</label>
        <input type="text" id="edit-total-time" placeholder="e.g., 1 hour 30 minutes">

        <label for="edit-hours-worked">Hours Worked (Optional)</label>
        <input type="number" id="edit-hours-worked">

        <button type="button" class="save-btn" onclick="saveEditedLogEntry()">Save</button>
        <button type="button" class="cancel-btn" onclick="closeEditForm()">Cancel</button>
        <input type="hidden" id="edit-index">
    </div>

    <script>
        // Replace with your actual Google Maps API key
        const GOOGLE_MAPS_API_KEY = 'YOUR_GOOGLE_MAPS_API_KEY';
        document.querySelector('script[src*="maps.googleapis.com"]').src =
            `https://maps.googleapis.com/maps/api/js?key=${GOOGLE_MAPS_API_KEY}&libraries=places&callback=initMap`;

        let map;
        let directionsService;
        let directionsRenderer;
        let autocompleteStart, autocompleteEnd;
        let logEntries = loadLog();
        let editingIndex = -1;

        function initMap() {
            map = new google.maps.Map(document.getElementById("map"), {
                zoom: 10,
                center: {
                    lat: 37.7749,
                    lng: -122.4194
                },
                mapTypeControl: false,
                streetViewControl: false

            });

            directionsService = new google.maps.DirectionsService();
            directionsRenderer = new google.maps.DirectionsRenderer({
                map: map,
                suppressMarkers: false
            });

            autocompleteStart = new google.maps.places.Autocomplete(document.getElementById('start-address'));
            autocompleteEnd = new google.maps.places.Autocomplete(document.getElementById('end-address'));

            autocompleteStart.addListener('place_changed', function () {
                if (!document.getElementById('start-address').value) {
                    alert("Please enter a valid start address.");
                }
            });

            autocompleteEnd.addListener('place_changed', function () {
                if (!document.getElementById('end-address').value) {
                    alert("Please enter a valid end address.");
                }
            });
        }

        function addDestination() {
            const container = document.getElementById('destinations-container');
            const destCount = container.getElementsByClassName('destination').length + 1;

            const newDest = document.createElement('div');
            newDest.classList.add('destination');newDest.classList.add('destination');
            newDest.innerHTML = `
                <label for="destination-${destCount}">Destination <span class="math-inline">\{destCount\}</label\>
<input type\="text" id\="destination\-</span>{destCount}" placeholder="Enter destination address" required>
                <label for="earnings-${destCount}">Earnings for Destination <span class="math-inline">\{destCount\}</label\>
<input type\="number" id\="earnings\-</span>{destCount}" placeholder="Enter earnings for destination" required>
                <div class="destination-actions">
                    
                    <button class="delete-btn" onclick="deleteDestination(this)">Delete</button>
                    <button class="move-btn" onclick="moveDestinationUp(this)">Move Up</button>
                    <button class="move-btn" onclick="moveDestinationDown(this)">Move Down</button>
                </div>
            `;
            container.appendChild(newDest);
            new google.maps.places.Autocomplete(newDest.querySelector('input[type="text"]'));
        }

        function deleteDestination(btn) {
            btn.parentNode.parentNode.remove();
            updateDestinationLabels();
        }

        function moveDestinationUp(btn) {
            const dest = btn.parentNode.parentNode;
            const container = document.getElementById('destinations-container');
            if (dest.previousElementSibling) {
                container.insertBefore(dest, dest.previousElementSibling);
                updateDestinationLabels();
            }
        }

        function moveDestinationDown(btn) {
            const dest = btn.parentNode.parentNode;
            const container = document.getElementById('destinations-container');
            if (dest.nextElementSibling) {
                container.insertBefore(dest.nextElementSibling, dest);
                updateDestinationLabels();
            }
        }

        function updateDestinationLabels() {
            const destinations = document.querySelectorAll('#destinations-container .destination');
            destinations.forEach((dest, index) => {
                dest.querySelector('label').textContent = `Destination ${index + 1}`;
                dest.querySelector('label').setAttribute('for', `destination-${index + 1}`);
                dest.querySelector('input[type="text"]').id = `destination-${index + 1}`;
                dest.querySelector('input[type="number"]').id = `earnings-${index + 1}`;
            });
        }

        async function optimizeRoute() {
            const start = document.getElementById('start-address').value;
            const end = document.getElementById('end-address').value;
            const destinations = Array.from(document.querySelectorAll('#destinations-container input[type="text"]'))
                .map(input => input.value);

            if (!start || !end || destinations.some(dest => !dest)) {
                alert("Please fill in all address fields.");
                return;
            }

            const waypoints = destinations.map(dest => ({
                location: dest,
                stopover: true
            }));

            try {
                const request = {
                    origin: start,
                    destination: end,
                    waypoints: waypoints,
                    optimizeWaypoints: true,
                    travelMode: google.maps.TravelMode.DRIVING
                };

                const result = await directionsService.route(request);

                const optimizedWaypoints = result.routes[0].waypoint_order.map(index => waypoints[index]);
                const optimizedRoute = [start, ...optimizedWaypoints.map(wp => wp.location), end];

                // Clear existing destinations
                const container = document.getElementById('destinations-container');
                container.innerHTML = '';

                // Add optimized destinations back to the form
                optimizedRoute.slice(1, -1).forEach((dest, index) => {
                    const destElem = document.createElement('div');
                    destElem.classList.add('destination');
                    destElem.innerHTML = `
                        <label for="destination-${index + 1}">Destination <span class="math-inline">\{index \+ 1\}</label\>
<input type\="text" id\="destination\-</span>{index + 1}" value="<span class="math-inline">\{dest\}" required\>
<label for\="earnings\-</span>{index + 1}">Earnings for Destination <span class="math-inline">\{index \+ 1\}</label\>
<input type\="number" id\="earnings\-</span>{index + 1}" placeholder="Enter earnings for destination" required>
                        <div class="destination-actions">
                            
                            <button class="delete-btn" onclick="deleteDestination(this)">Delete</button>
                            <button class="move-btn" onclick="moveDestinationUp(this)">Move Up</button>
                            <button class="move-btn" onclick="moveDestinationDown(this)">Move Down</button>
                        </div>
                    `;
                    container.appendChild(destElem);
                    new google.maps.places.Autocomplete(destElem.querySelector('input[type="text"]'));
                });

                alert("Route optimized successfully!");
            } catch (error) {
                console.error("Error optimizing route:", error);
                alert("Could not optimize route. Please check the addresses.");
            }
        }

async function calculateRoute() {
        const start = document.getElementById('start-address').value;
        const end = document.getElementById('end-address').value;
        const mpg = parseFloat(document.getElementById('mpg').value);
        const gasPrice = parseFloat(document.getElementById('gas-price').value);
        const hoursWorked = parseFloat(document.getElementById('hours-worked').value) || 0;
        const maintenanceCost = parseFloat(document.getElementById('maintenance-cost').value) || 0;
        const suppliesCost = parseFloat(document.getElementById('supplies-cost').value) || 0;

        const destinations = Array.from(document.querySelectorAll('#destinations-container input[type="text"]'))
            .map(input => input.value);
        const earnings = Array.from(document.querySelectorAll('#destinations-container input[type="number"]'))
            .map(input => parseFloat(input.value));

        if (!start || !end || isNaN(mpg) || isNaN(gasPrice) || destinations.some(dest => !dest) || earnings.some(isNaN)) {
            alert("Please fill in all fields with valid numbers.");
            return null;
        }

        const waypoints = destinations.map(dest => ({
            location: dest,
            stopover: true
        }));

        const request = {
            origin: start,
            destination: end,
            waypoints: waypoints,
            optimizeWaypoints: false,
            travelMode: google.maps.TravelMode.DRIVING
        };

        try {
            const result = await directionsService.route(request);
            directionsRenderer.setDirections(result);

            let totalDistance = 0;
            let totalDuration = 0;
            result.routes[0].legs.forEach(leg => {
                totalDistance += leg.distance.value;
                totalDuration += leg.duration.value;
            });

            const fuelCost = (totalDistance / 1609.34) / mpg * gasPrice;
            const totalEarnings = earnings.reduce((sum, earning) => sum + earning, 0);
            const netProfit = totalEarnings - fuelCost - maintenanceCost - suppliesCost;
            const totalHours = totalDuration / 3600 + hoursWorked;
            const profitPerHour = totalHours > 0 ? netProfit / totalHours : 0;

            document.getElementById('total-mileage').textContent = (totalDistance / 1609.34).toFixed(2);
            document.getElementById('total-time').textContent = formatDuration(totalDuration);
            document.getElementById('total-earnings').textContent = totalEarnings.toFixed(2);
            document.getElementById('fuel-cost').textContent = fuelCost.toFixed(2);
            document.getElementById('maintenance-cost-result').textContent = maintenanceCost.toFixed(2);
            document.getElementById('supplies-cost-result').textContent = suppliesCost.toFixed(2);
            document.getElementById('net-profit').textContent = netProfit.toFixed(2);
            document.getElementById('profit-per-hour').textContent = profitPerHour.toFixed(2);

            document.getElementById('results').classList.remove('hidden');
            document.getElementById('map').classList.remove('hidden');

            lastCalculationResult = {
                date: new Date().toLocaleDateString(),
                startAddress: start,
                destinations: destinations.map((dest, index) => ({
                    address: dest,
                    earning: earnings[index]
                })),
                endAddress: end,
                totalEarnings: totalEarnings,
                fuelCost: fuelCost,
                maintenanceCost: maintenanceCost,
                suppliesCost: suppliesCost,
                netProfit: netProfit,
                totalMileage: (totalDistance / 1609.34).toFixed(2),
                totalTime: formatDuration(totalDuration),
                hoursWorked: hoursWorked,
                profitPerHour: profitPerHour
            };

            return lastCalculationResult;

        } catch (error) {
            console.error("Error calculating route:", error);
            alert("Could not calculate route. Please check the addresses and try again.");
            return null;
        }
    }

    function logLastResult() {
        if (lastCalculationResult) {
            logEntry(lastCalculationResult);
            displayLog();
            populateDayOptions();
            alert("Entry logged successfully!");
        } else {
            alert("Please calculate first before logging.");
        }
    }
</script>
</body>

</html>
